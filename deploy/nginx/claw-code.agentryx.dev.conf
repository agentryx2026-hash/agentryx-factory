# ═══════════════════════════════════════════════════════════
#  CLAW CODE — Nginx Reverse Proxy
#  Domain: claw-code.agentryx.dev
#  Proxies to ttyd (web terminal) running on :7681
# ═══════════════════════════════════════════════════════════

server {
    server_name claw-code.agentryx.dev;

    # Certbot will modify this block for HTTPS redirect

    location / {
        auth_basic "Claw Code — Agentryx Dev Factory";
        auth_basic_user_file /etc/nginx/.htpasswd-claw-code;
        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        proxy_cache off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/claw-code.agentryx.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/claw-code.agentryx.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = claw-code.agentryx.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name claw-code.agentryx.dev;
    return 404; # managed by Certbot


}